<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labyrinth - Unified Casual Edition</title>

    <!-- Google Fonts & Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ========================================================================= -->
    <!-- ADEGAN 0: LAYAR LOGIN (Ditampilkan paling pertama)                        -->
    <!-- ========================================================================= -->
    <div id="screen-login" class="screen-container active-screen">

        <!-- Dekorasi Background Login (Awan, Bintang, dll) -->
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="sun">☀️</div>
        <div class="star star1">⭐</div>
        <div class="star star2">⭐</div>
        <div class="star star3">⭐</div>
        <div class="ghost">👻</div>
        <div class="tree tree-left">🌳</div>
        <div class="tree tree-right">🌳</div>
        <div class="flower flower1">🌼</div>
        <div class="flower flower2">🌼</div>
        <div class="flower flower3">🌼</div>
        <div class="gate">🚪</div>
        <div class="grass-floor"></div>

        <!-- Panel Login -->
        <div class="login-container z-10 relative">
            <div class="title">
                <h1>LABYRINTH</h1>
                <p>Casual Coding Game</p>
            </div>

            <div class="login-box">
                <h2>LOGIN</h2>
                <form id="loginForm" autocomplete="off">
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="Masukkan Username">
                    </div>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan Password">
                        <span id="togglePassword">
                            <i id="eyeIcon" class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                    <button type="submit" id="loginButton" class="btn-casual w-full py-4 text-xl">
                        <i class="fa-solid fa-right-to-bracket mr-2"></i> MASUK
                    </button>
                    <p id="error"></p>
                </form>
            </div>
        </div>
    </div>


    <!-- ========================================================================= -->
    <!-- ADEGAN 1: MAIN MENU (Disembunyikan, muncul setelah login)                 -->
    <!-- ========================================================================= -->
    <div id="screen-menu" class="screen-container hidden z-10">

        <!-- Dekorasi Background Menu (Diduplikasi dari Login agar konsisten) -->
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="sun">☀️</div>
        <div class="star star1">⭐</div>
        <div class="star star2">⭐</div>
        <div class="star star3">⭐</div>
        <div class="ghost">👻</div>
        <div class="tree tree-left">🌳</div>
        <div class="tree tree-right">🌳</div>
        <div class="flower flower1">🌼</div>
        <div class="flower flower2">🌼</div>
        <div class="flower flower3">🌼</div>
        <div class="gate">🚪</div>
        <div class="grass-floor"></div>

        <!-- Panel Menu -->
        <div class="panel-casual w-[500px] p-8 relative z-20">
            <div
                class="badge-casual absolute -top-6 left-1/2 -translate-x-1/2 px-8 py-2 text-white text-xl font-black shadow-md">
                LABYRINTH
            </div>

            <div class="panel-inner mt-6 p-8">
                <!-- Halaman Menu -->
                <div id="menuPage">
                    <h1 class="text-3xl text-center font-black text-amber-700 mb-8">MENU UTAMA</h1>
                    <button onclick="navigateSPA('game')" class="btn-casual w-full py-4 text-xl mb-5">
                        <i class="fa-solid fa-play mr-2"></i> START
                    </button>
                    <button onclick="toggleSettingPage(true)" class="btn-casual w-full py-4 text-xl mb-5">
                        <i class="fa-solid fa-gear mr-2"></i> PENGATURAN
                    </button>
                    <button onclick="logoutSPA()" class="btn-casual w-full py-4 text-xl">
                        <i class="fa-solid fa-right-from-bracket mr-2"></i> LOGOUT
                    </button>
                </div>

                <!-- Halaman Pengaturan -->
                <div id="settingPage" class="hidden">
                    <h1 class="text-3xl text-center font-black text-amber-700 mb-8">PENGATURAN</h1>
                    <p class="font-bold mb-4 text-amber-900">Bahasa Koding</p>
                    <div class="space-y-3">
                        <label class="language-card flex items-center">
                            <input type="radio" name="language" value="python" checked class="mr-3"> Python
                        </label>
                        <label class="language-card flex items-center">
                            <input type="radio" name="language" value="javascript" class="mr-3"> JavaScript
                        </label>
                        <label class="language-card flex items-center">
                            <input type="radio" name="language" value="java" class="mr-3"> Java
                        </label>
                        <label class="language-card flex items-center">
                            <input type="radio" name="language" value="cpp" class="mr-3"> C++
                        </label>
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button onclick="saveLanguage()" class="btn-casual flex-1 py-3 text-lg">SIMPAN</button>
                        <button onclick="toggleSettingPage(false)"
                            class="btn-casual flex-1 py-3 text-lg">KEMBALI</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- ========================================================================= -->
    <!-- ADEGAN 2: GAME AREA (Disembunyikan pertama kali)                          -->
    <!-- ========================================================================= -->
    <div id="screen-game" class="screen-container hidden flex-col p-4 md:p-8 gap-8 relative z-10">

        <!-- Header Game -->
        <header class="flex justify-between items-center z-10 w-full max-w-6xl mx-auto">
            <button onclick="navigateSPA('menu')"
                class="bg-amber-400 border-4 border-white rounded-full w-14 h-14 flex items-center justify-center text-white text-2xl shadow-[0_6px_0_#b45309] active:translate-y-[6px] active:shadow-none transition-all">
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <div id="levelBadge" class="badge-casual px-8 py-2 text-white font-black text-2xl -mt-2">
                LEVEL 1 / 5
            </div>

            <div class="bg-white border-4 border-slate-200 rounded-full px-6 py-2 flex items-center gap-2 shadow-md">
                <i class="fa-solid fa-star text-yellow-400 text-xl"></i>
                <span id="scoreText" class="text-slate-700 font-black text-xl">0 / 2</span>
            </div>
        </header>

        <!-- Papan Kerja (Kiri Code, Kanan Board) -->
        <main class="flex-1 flex flex-col md:flex-row gap-8 max-w-6xl mx-auto w-full z-10">
            <!-- PANEL KIRI -->
            <section class="panel-casual w-full md:w-1/2 flex flex-col relative mt-6">
                <div
                    class="badge-casual absolute -top-6 left-1/2 -translate-x-1/2 px-8 py-2 text-white font-black tracking-widest text-lg shadow-sm">
                    ALGORITMA
                </div>

                <div class="flex-1 p-6 pt-10 flex flex-col gap-4">
                    <div class="panel-inner flex-1 p-4 shadow-inner relative">
                        <textarea id="codeEditor" class="w-full h-full text-sm leading-relaxed"
                            spellcheck="false"></textarea>
                    </div>

                    <div class="flex items-center gap-4">
                        <button id="runBtn" onclick="executeCode()" class="btn-casual flex-1 py-3 text-xl font-black">
                            <i class="fa-solid fa-play mr-2"></i> JALANKAN
                        </button>
                        <button id="resetBtnTop" onclick="resetGame()"
                            class="bg-rose-400 border-4 border-white rounded-2xl w-16 h-14 flex items-center justify-center text-white text-xl shadow-[0_6px_0_#be123c] active:translate-y-[6px] active:shadow-none transition-all">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- PANEL KANAN -->
            <section class="panel-casual w-full md:w-1/2 flex flex-col relative mt-6 pb-6">
                <div
                    class="badge-casual absolute -top-6 left-1/2 -translate-x-1/2 px-8 py-2 text-white font-black tracking-widest text-lg shadow-sm">
                    SIMULASI
                </div>

                <div class="flex-1 flex flex-col items-center justify-center pt-8 gap-4 px-6">
                    <div id="gameBoard" class="game-board"></div>
                    <div
                        class="w-full max-w-sm bg-white/50 rounded-xl p-2 border-2 border-white/60 h-28 flex flex-col shadow-inner overflow-hidden">
                        <div id="consoleLog" class="flex-1 overflow-y-auto text-xs font-bold space-y-1"></div>
                    </div>
                </div>

                <!-- Overlay Status Permainan -->
                <div id="statusOverlay"
                    class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm rounded-[28px] hidden flex-col items-center justify-center z-30">
                    <div
                        class="bg-white border-8 border-yellow-400 rounded-3xl p-8 flex flex-col items-center shadow-2xl transform scale-110">
                        <i id="statusIcon" class="fa-solid fa-award text-6xl text-yellow-400 mb-4 drop-shadow-md"></i>
                        <h1 id="statusText" class="text-3xl font-black text-slate-800 mb-2">HEBAT!</h1>
                        <p id="statusDesc" class="text-slate-500 font-bold mb-6 text-center">Kamu berhasil menyelesaikan
                            level ini.</p>
                        <div class="flex gap-4">
                            <button onclick="resetGame()"
                                class="bg-slate-300 border-4 border-white text-slate-600 rounded-full w-14 h-14 text-xl shadow-[0_4px_0_#94a3b8] active:translate-y-[4px] active:shadow-none">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                            <button id="nextBtn" onclick="nextLevel()"
                                class="btn-casual px-8 py-2 text-xl shadow-[0_4px_0_#4d7c0f]">
                                LANJUT <i class="fa-solid fa-forward-step ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Menghubungkan ke file JavaScript -->
    <script src="script.js"></script>
</body>

</html>
