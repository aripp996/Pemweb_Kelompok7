<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labyrinth - Menu</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, #7dd3fc 0%, #38bdf8 60%, #4ade80 60%, #22c55e 100%);
        }

        .panel-casual {
            background: #fde68a;
            border: 8px solid white;
            border-radius: 32px;
            box-shadow:
                0 10px 0 rgba(217, 119, 6, .2),
                0 20px 25px rgba(0, 0, 0, .15);
        }

        .panel-inner {
            background: #fef3c7;
            border: 4px solid #f59e0b;
            border-radius: 22px;
        }

        .btn-casual {
            background: #84cc16;
            border: 4px solid white;
            border-radius: 9999px;
            color: white;
            font-weight: 900;
            box-shadow: 0 6px 0 #4d7c0f;
            transition: .15s;
        }

        .btn-casual:hover {
            transform: scale(1.02);
        }

        .btn-casual:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .badge-casual {
            background: #84cc16;
            border: 4px solid white;
            border-radius: 9999px;
            box-shadow: 0 4px 0 #4d7c0f;
        }

        .hidden {
            display: none;
        }

        .language-card {
            background: white;
            border: 3px solid #f59e0b;
            border-radius: 15px;
            padding: 14px;
        }
    </style>

</head>

<body class="h-screen flex justify-center items-center">

    <div class="panel-casual w-[500px] p-8 relative">

        <div class="badge-casual absolute -top-6 left-1/2 -translate-x-1/2 px-8 py-2 text-white text-xl font-black">

            LABYRINTH

        </div>

        <div class="panel-inner mt-6 p-8">

            <!-- ================= MENU ================= -->

            <div id="menuPage">

                <h1 class="text-3xl text-center font-black text-amber-700 mb-8">

                    MENU UTAMA

                </h1>

                <button onclick="startGame()" class="btn-casual w-full py-4 text-xl mb-5">

                    <i class="fa-solid fa-play mr-2"></i>

                    START

                </button>

                <button onclick="openSetting()" class="btn-casual w-full py-4 text-xl mb-5">

                    <i class="fa-solid fa-gear mr-2"></i>

                    PENGATURAN

                </button>

                <button onclick="logout()" class="btn-casual w-full py-4 text-xl">

                    <i class="fa-solid fa-right-from-bracket mr-2"></i>

                    LOGOUT

                </button>

            </div>

            <!-- ================= SETTING ================= -->

            <div id="settingPage" class="hidden">

                <h1 class="text-3xl text-center font-black text-amber-700 mb-8">

                    PENGATURAN

                </h1>

                <p class="font-bold mb-4">

                    Bahasa Koding

                </p>

                <div class="space-y-3">

                    <label class="language-card flex items-center">

                        <input type="radio" name="language" value="python" checked class="mr-3">

                        Python

                    </label>

                    <label class="language-card flex items-center">

                        <input type="radio" name="language" value="javascript" class="mr-3">

                        JavaScript

                    </label>

                    <label class="language-card flex items-center">

                        <input type="radio" name="language" value="java" class="mr-3">

                        Java

                    </label>

                    <label class="language-card flex items-center">

                        <input type="radio" name="language" value="cpp" class="mr-3">

                        C++

                    </label>

                </div>

                <div class="flex gap-4 mt-8">

                    <button onclick="saveLanguage()" class="btn-casual flex-1 py-3">

                        SIMPAN

                    </button>

                    <button onclick="backMenu()" class="btn-casual flex-1 py-3">

                        KEMBALI

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>

        function startGame() {

            window.location.href = "index.html";

        }

        function logout() {

            window.location.href = "login.html";

        }

        function openSetting() {

            document.getElementById("menuPage").classList.add("hidden");

            document.getElementById("settingPage").classList.remove("hidden");

        }

        function backMenu() {

            document.getElementById("settingPage").classList.add("hidden");

            document.getElementById("menuPage").classList.remove("hidden");

        }

        function saveLanguage() {

            const language = document.querySelector('input[name="language"]:checked').value;

            localStorage.setItem("language", language);

            alert("Bahasa berhasil disimpan.");

            backMenu();

        }

        window.onload = function () {

            const saved = localStorage.getItem("language");

            if (saved) {

                const radio = document.querySelector(`input[value="${saved}"]`);

                if (radio) {

                    radio.checked = true;

                }

            }

        }

    </script>

</body>

</html>
